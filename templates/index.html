<!DOCTYPE html>
<html>
<head>

<title>Aviator Crash Simulator</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h2>Aviator Crash Simulator</h2>

<p class="saldo">Saldo: {{ saldo }}</p>

<form method="post">

<label>Aposta</label>
<input type="number" step="0.01" name="aposta">

<label>Cashout</label>
<input type="number" step="0.01" name="cashout" value="1.3">

<button type="submit">Rodada</button>

</form>

{% if resultado %}

<div class="resultado">

<p>Multiplicador: {{ resultado.multiplicador }}x</p>

<p class="{{ 'ganhou' if resultado.ganhou else 'perdeu' }}">
{{ "GANHOU" if resultado.ganhou else "PERDEU" }}
</p>

</div>

{% endif %}

</div>

</body>
</html>
